name: Deploy pyMC Docs to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'pyMC_docs/**'
      - 'pyMC_docs/.github/workflows/deploy-cloudflare-pages.yml'
  pull_request:
    paths:
      - 'pyMC_docs/**'
      - 'pyMC_docs/.github/workflows/deploy-cloudflare-pages.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: pyMC_docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pyMC_docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
            --commit-dirty=true

      - name: Upload preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pymc-docs-preview
          path: pyMC_docs/dist
